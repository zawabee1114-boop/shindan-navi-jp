<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf8f0"/>
      <stop offset="100%" stop-color="#f5e0b5"/>
    </linearGradient>
    <linearGradient id="circle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a26a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c8a26a" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1020" cy="100" r="220" fill="#c8a26a" fill-opacity="0.08"/>
  <circle cx="100" cy="580" r="160" fill="#c8a26a" fill-opacity="0.06"/>

  <!-- Top badge -->
  <rect x="60" y="52" width="160" height="36" rx="18" fill="#c8a26a"/>
  <text x="140" y="75" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">診断ナビ</text>

  <!-- Big icon area -->
  <circle cx="980" cy="315" r="170" fill="#c8a26a" fill-opacity="0.12"/>
  <circle cx="980" cy="315" r="120" fill="#c8a26a" fill-opacity="0.1"/>
  <g transform="translate(910, 245) scale(5.833333333333333)">
      <path d="M9 4.5h6l-1.5 3 1.5 1c2.4 1.5 4 4.2 4 6.8 0 3-2.5 5.2-7 5.2s-7-2.2-7-5.2c0-2.6 1.6-5.3 4-6.8L10.5 7.5 9 4.5z" fill="white"/>
    </g>

  <!-- Main headline -->
  <text x="60" y="220" font-family="'Noto Sans JP', sans-serif" font-size="62" font-weight="900" fill="#1f2235" letter-spacing="-1">金銭感覚診断</text>

  <!-- Subtitle -->
  <text x="60" y="278" font-family="'Noto Sans JP', sans-serif" font-size="22" font-weight="600" fill="#c8a26a">行動経済学ベース | お金との向き合い方</text>

  <!-- Description -->
  <text x="60" y="340" font-family="'Noto Sans JP', sans-serif" font-size="26" font-weight="400" fill="#3b3d56">あなたのマネースタイルを4タイプで分析</text>

  <!-- Feature chip: 完全無料 -->
  <rect x="60" y="390" width="110" height="38" rx="19" fill="none" stroke="#c8a26a" stroke-width="1.5"/>
  <text x="115" y="414" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="600" fill="#c8a26a" text-anchor="middle">完全無料</text>

  <!-- Feature chip: 相性診断あり -->
  <rect x="184" y="390" width="130" height="38" rx="19" fill="none" stroke="#c8a26a" stroke-width="1.5"/>
  <text x="249" y="414" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="600" fill="#c8a26a" text-anchor="middle">相性診断あり</text>

  <!-- Feature chip: 統合プロファイル -->
  <rect x="328" y="390" width="160" height="38" rx="19" fill="none" stroke="#c8a26a" stroke-width="1.5"/>
  <text x="408" y="414" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="600" fill="#c8a26a" text-anchor="middle">統合プロファイル</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#c8a26a" fill-opacity="0.12"/>
  <text x="600" y="616" font-family="'Inter', sans-serif" font-size="17" font-weight="600" fill="#c8a26a" text-anchor="middle">shindan-navi.jp</text>
</svg>