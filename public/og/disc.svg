<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf9"/>
      <stop offset="100%" stop-color="#a7f3e0"/>
    </linearGradient>
    <linearGradient id="circle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34c0a8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#34c0a8" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1020" cy="100" r="220" fill="#34c0a8" fill-opacity="0.08"/>
  <circle cx="100" cy="580" r="160" fill="#34c0a8" fill-opacity="0.06"/>

  <!-- Top badge -->
  <rect x="60" y="52" width="160" height="36" rx="18" fill="#34c0a8"/>
  <text x="140" y="75" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">診断ナビ</text>

  <!-- Big icon area -->
  <circle cx="980" cy="315" r="170" fill="#34c0a8" fill-opacity="0.12"/>
  <circle cx="980" cy="315" r="120" fill="#34c0a8" fill-opacity="0.1"/>
  <g transform="translate(910, 245) scale(5.833333333333333)">
      <circle cx="12" cy="12" r="9" fill="white"/>
      <path d="M12 3v18M3 12h18" stroke="rgba(255,255,255,.7)" stroke-width="1.6"/>
      <circle cx="12" cy="12" r="3.2" fill="rgba(255,255,255,.95)"/>
    </g>

  <!-- Main headline -->
  <text x="60" y="220" font-family="'Noto Sans JP', sans-serif" font-size="62" font-weight="900" fill="#1f2235" letter-spacing="-1">DiSC診断</text>

  <!-- Subtitle -->
  <text x="60" y="278" font-family="'Noto Sans JP', sans-serif" font-size="22" font-weight="600" fill="#34c0a8">4スタイル | 行動・リーダーシップ</text>

  <!-- Description -->
  <text x="60" y="340" font-family="'Noto Sans JP', sans-serif" font-size="26" font-weight="400" fill="#3b3d56">チームでの役割と強みを分析</text>

  <!-- Feature chip: 完全無料 -->
  <rect x="60" y="390" width="110" height="38" rx="19" fill="none" stroke="#34c0a8" stroke-width="1.5"/>
  <text x="115" y="414" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="600" fill="#34c0a8" text-anchor="middle">完全無料</text>

  <!-- Feature chip: 相性診断あり -->
  <rect x="184" y="390" width="130" height="38" rx="19" fill="none" stroke="#34c0a8" stroke-width="1.5"/>
  <text x="249" y="414" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="600" fill="#34c0a8" text-anchor="middle">相性診断あり</text>

  <!-- Feature chip: 統合プロファイル -->
  <rect x="328" y="390" width="160" height="38" rx="19" fill="none" stroke="#34c0a8" stroke-width="1.5"/>
  <text x="408" y="414" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="600" fill="#34c0a8" text-anchor="middle">統合プロファイル</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#34c0a8" fill-opacity="0.12"/>
  <text x="600" y="616" font-family="'Inter', sans-serif" font-size="17" font-weight="600" fill="#34c0a8" text-anchor="middle">shindan-navi.jp</text>
</svg>