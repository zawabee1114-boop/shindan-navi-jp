<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff4eb"/>
      <stop offset="100%" stop-color="#ffd6b0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1020" cy="80" r="240" fill="#ff9a4d" fill-opacity="0.09"/>
  <circle cx="80" cy="580" r="160" fill="#ff9a4d" fill-opacity="0.06"/>
  <circle cx="500" cy="620" r="120" fill="#ff9a4d" fill-opacity="0.04"/>

  <!-- 診断ラベル（左上バッジ） -->
  <rect x="60" y="48" width="176" height="36" rx="18" fill="#ff9a4d"/>
  <text x="148" y="71" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">多重知能テスト</text>

  <!-- 「あなたのタイプ」ラベル -->
  <text x="60" y="148" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="18" font-weight="600" fill="#ff9a4d">あなたのタイプ</text>

  <!-- タイプID バッジ（MBTI/DiSC） -->
  

  <!-- タイプ名 メイン -->
  <text x="60" y="215" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="50" font-weight="900" fill="#1f2235" letter-spacing="-0.5">対人的知能タイプ</text>

  <!-- サブテキスト（英語名等） -->
  <text x="60" y="255" font-family="'Inter', 'Arial', sans-serif" font-size="20" font-weight="500" fill="#ff9a4d" opacity="0.85">Interpersonal</text>

  <!-- キャッチフレーズ 1行目 -->
  <text x="60" y="310" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="24" font-weight="400" fill="#3b3d56">人の心を読む。共に前へ進む、繋がりの達人</text>
  <!-- キャッチフレーズ 2行目 -->
  

  <!-- 右側アイコン装飾 -->
  <circle cx="980" cy="300" r="170" fill="#ff9a4d" fill-opacity="0.12"/>
  <circle cx="980" cy="300" r="120" fill="#ff9a4d" fill-opacity="0.10"/>
  <g transform="translate(910, 230) scale(5.833333333333333)">
    <path d="M8.5 3.5c-2 0-3.5 1.4-3.5 3.2 0 .4.1.8.2 1.2C3.8 8.6 3 9.8 3 11.2c0 1.3.7 2.4 1.8 3-.5.6-.8 1.4-.8 2.2 0 1.9 1.5 3.3 3.5 3.3 1.1 0 2.1-.5 2.8-1.2.5.4 1.1.6 1.7.6V5c-.7-.9-1.9-1.5-3.5-1.5z" fill="white"/>
    <path d="M15.5 3.5c2 0 3.5 1.4 3.5 3.2 0 .4-.1.8-.2 1.2 1.4.7 2.2 1.9 2.2 3.3 0 1.3-.7 2.4-1.8 3 .5.6.8 1.4.8 2.2 0 1.9-1.5 3.3-3.5 3.3-1.1 0-2.1-.5-2.8-1.2-.5.4-1.1.6-1.7.6V5c.7-.9 1.9-1.5 3.5-1.5z" fill="white" fill-opacity=".75"/>
  </g>

  <!-- シェアCTA バッジ -->
  <rect x="60" y="400" width="168" height="40" rx="20" fill="none" stroke="#ff9a4d" stroke-width="1.5"/>
  <text x="144" y="425" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="15" font-weight="600" fill="#ff9a4d" text-anchor="middle">完全無料で診断</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#ff9a4d" fill-opacity="0.12"/>
  <text x="600" y="616" font-family="'Inter', 'Arial', sans-serif" font-size="17" font-weight="600" fill="#ff9a4d" text-anchor="middle">shindan-navi.jp</text>
