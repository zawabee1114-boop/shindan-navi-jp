<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#efeaff"/>
      <stop offset="100%" stop-color="#c2b3ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1020" cy="80" r="240" fill="#7c5cff" fill-opacity="0.09"/>
  <circle cx="80" cy="580" r="160" fill="#7c5cff" fill-opacity="0.06"/>
  <circle cx="500" cy="620" r="120" fill="#7c5cff" fill-opacity="0.04"/>

  <!-- 診断ラベル（左上バッジ） -->
  <rect x="60" y="48" width="176" height="36" rx="18" fill="#7c5cff"/>
  <text x="148" y="71" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">統合プロファイル</text>

  <!-- 「あなたのタイプ」ラベル -->
  <text x="60" y="148" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="18" font-weight="600" fill="#7c5cff">あなたのタイプ</text>

  <!-- タイプID バッジ（MBTI/DiSC） -->
  

  <!-- タイプ名 メイン -->
  <text x="60" y="215" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="50" font-weight="900" fill="#1f2235" letter-spacing="-0.5">トラ</text>

  <!-- サブテキスト（英語名等） -->
  <text x="60" y="255" font-family="'Inter', 'Arial', sans-serif" font-size="20" font-weight="500" fill="#7c5cff" opacity="0.85">独自の世界観を持つ、孤独な芸術家</text>

  <!-- キャッチフレーズ 1行目 -->
  <text x="60" y="310" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="24" font-weight="400" fill="#3b3d56">独自の世界観を持つ、孤独な芸術家</text>
  <!-- キャッチフレーズ 2行目 -->
  

  <!-- 右側アイコン装飾 -->
  <circle cx="980" cy="300" r="170" fill="#7c5cff" fill-opacity="0.12"/>
  <circle cx="980" cy="300" r="120" fill="#7c5cff" fill-opacity="0.10"/>
  <g transform="translate(910, 230) scale(5.833333333333333)">
    <circle cx="9" cy="7" r="2.5" fill="white"/>
    <circle cx="15" cy="7" r="2.5" fill="white"/>
    <circle cx="6" cy="11" r="2" fill="white" fill-opacity=".8"/>
    <circle cx="18" cy="11" r="2" fill="white" fill-opacity=".8"/>
    <ellipse cx="12" cy="15" rx="5" ry="4" fill="white"/>
  </g>

  <!-- シェアCTA バッジ -->
  <rect x="60" y="400" width="168" height="40" rx="20" fill="none" stroke="#7c5cff" stroke-width="1.5"/>
  <text x="144" y="425" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="15" font-weight="600" fill="#7c5cff" text-anchor="middle">完全無料で診断</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#7c5cff" fill-opacity="0.12"/>
  <text x="600" y="616" font-family="'Inter', 'Arial', sans-serif" font-size="17" font-weight="600" fill="#7c5cff" text-anchor="middle">shindan-navi.jp</text>
</svg>