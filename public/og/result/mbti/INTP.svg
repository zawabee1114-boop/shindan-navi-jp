<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3eeff"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1020" cy="80" r="240" fill="#8b5cf6" fill-opacity="0.09"/>
  <circle cx="80" cy="580" r="160" fill="#8b5cf6" fill-opacity="0.06"/>
  <circle cx="500" cy="620" r="120" fill="#8b5cf6" fill-opacity="0.04"/>

  <!-- 診断ラベル（左上バッジ） -->
  <rect x="60" y="48" width="176" height="36" rx="18" fill="#8b5cf6"/>
  <text x="148" y="71" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">MBTI診断（16タイプ）</text>

  <!-- 「あなたのタイプ」ラベル -->
  <text x="60" y="148" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="18" font-weight="600" fill="#8b5cf6">あなたのタイプ</text>

  <!-- タイプID バッジ（MBTI/DiSC） -->
  <rect x="60" y="165" width="160" height="64" rx="12" fill="#8b5cf6" fill-opacity="0.12"/>
  <text x="140" y="210" font-family="'Inter', 'Arial', sans-serif" font-size="40" font-weight="900" fill="#8b5cf6" text-anchor="middle" letter-spacing="2">INTP</text>

  <!-- タイプ名 メイン -->
  <text x="60" y="275" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="50" font-weight="900" fill="#1f2235" letter-spacing="-0.5">思想家</text>

  <!-- サブテキスト（英語名等） -->
  <text x="60" y="315" font-family="'Inter', 'Arial', sans-serif" font-size="20" font-weight="500" fill="#8b5cf6" opacity="0.85">INTP - The Thinker</text>

  <!-- キャッチフレーズ 1行目 -->
  <text x="60" y="375" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="24" font-weight="400" fill="#3b3d56">論理の探究者。知の海を自由に泳ぐ革新者</text>
  <!-- キャッチフレーズ 2行目 -->
  

  <!-- 右側アイコン装飾 -->
  <circle cx="980" cy="300" r="170" fill="#8b5cf6" fill-opacity="0.12"/>
  <circle cx="980" cy="300" r="120" fill="#8b5cf6" fill-opacity="0.10"/>
  <g transform="translate(910, 230) scale(5.833333333333333)">
    <circle cx="9" cy="9" r="5" fill="white" fill-opacity=".9"/>
    <circle cx="15" cy="9" r="5" fill="white" fill-opacity=".7"/>
    <circle cx="9" cy="15" r="5" fill="white" fill-opacity=".75"/>
    <circle cx="15" cy="15" r="5" fill="white" fill-opacity=".85"/>
  </g>

  <!-- シェアCTA バッジ -->
  <rect x="60" y="460" width="168" height="40" rx="20" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="144" y="485" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="15" font-weight="600" fill="#8b5cf6" text-anchor="middle">完全無料で診断</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#8b5cf6" fill-opacity="0.12"/>
  <text x="600" y="616" font-family="'Inter', 'Arial', sans-serif" font-size="17" font-weight="600" fill="#8b5cf6" text-anchor="middle">shindan-navi.jp</text>
</svg>