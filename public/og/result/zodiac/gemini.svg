<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1020" cy="80" r="240" fill="#6366f1" fill-opacity="0.09"/>
  <circle cx="80" cy="580" r="160" fill="#6366f1" fill-opacity="0.06"/>
  <circle cx="500" cy="620" r="120" fill="#6366f1" fill-opacity="0.04"/>

  <!-- 診断ラベル（左上バッジ） -->
  <rect x="60" y="48" width="176" height="36" rx="18" fill="#6366f1"/>
  <text x="148" y="71" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">星座性格診断</text>

  <!-- 「あなたのタイプ」ラベル -->
  <text x="60" y="148" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="18" font-weight="600" fill="#6366f1">あなたのタイプ</text>

  <!-- タイプID バッジ（MBTI/DiSC） -->
  

  <!-- タイプ名 メイン -->
  <text x="60" y="215" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="50" font-weight="900" fill="#1f2235" letter-spacing="-0.5">双子座</text>

  <!-- サブテキスト（英語名等） -->
  <text x="60" y="255" font-family="'Inter', 'Arial', sans-serif" font-size="20" font-weight="500" fill="#6366f1" opacity="0.85">Gemini</text>

  <!-- キャッチフレーズ 1行目 -->
  <text x="60" y="310" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="24" font-weight="400" fill="#3b3d56">知識と対話で世界を広げる。情報の橋渡し役</text>
  <!-- キャッチフレーズ 2行目 -->
  

  <!-- 右側アイコン装飾 -->
  <circle cx="980" cy="300" r="170" fill="#6366f1" fill-opacity="0.12"/>
  <circle cx="980" cy="300" r="120" fill="#6366f1" fill-opacity="0.10"/>
  <g transform="translate(910, 230) scale(5.833333333333333)"><path d="M8 4 L8 20 M16 4 L16 20 M8 4 C10 6 14 6 16 4 M8 20 C10 18 14 18 16 20 M8 12 C10 11 14 13 16 12" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none"/></g>

  <!-- シェアCTA バッジ -->
  <rect x="60" y="400" width="168" height="40" rx="20" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <text x="144" y="425" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="15" font-weight="600" fill="#6366f1" text-anchor="middle">完全無料で診断</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#6366f1" fill-opacity="0.12"/>
  <text x="600" y="616" font-family="'Inter', 'Arial', sans-serif" font-size="17" font-weight="600" fill="#6366f1" text-anchor="middle">shindan-navi.jp</text>
</svg>