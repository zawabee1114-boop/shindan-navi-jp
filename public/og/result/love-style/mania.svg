<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff0f7"/>
      <stop offset="100%" stop-color="#ffc8e1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1020" cy="80" r="240" fill="#ff7ab3" fill-opacity="0.09"/>
  <circle cx="80" cy="580" r="160" fill="#ff7ab3" fill-opacity="0.06"/>
  <circle cx="500" cy="620" r="120" fill="#ff7ab3" fill-opacity="0.04"/>

  <!-- 診断ラベル（左上バッジ） -->
  <rect x="60" y="48" width="176" height="36" rx="18" fill="#ff7ab3"/>
  <text x="148" y="71" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">恋愛スタイル診断</text>

  <!-- 「あなたのタイプ」ラベル -->
  <text x="60" y="148" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="18" font-weight="600" fill="#ff7ab3">あなたのタイプ</text>

  <!-- タイプID バッジ（MBTI/DiSC） -->
  

  <!-- タイプ名 メイン -->
  <text x="60" y="215" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="44" font-weight="900" fill="#1f2235" letter-spacing="-0.5">感情型（Mania）</text>

  <!-- サブテキスト（英語名等） -->
  <text x="60" y="255" font-family="'Inter', 'Arial', sans-serif" font-size="20" font-weight="500" fill="#ff7ab3" opacity="0.85">Mania</text>

  <!-- キャッチフレーズ 1行目 -->
  <text x="60" y="310" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="24" font-weight="400" fill="#3b3d56">愛の深さを全力で感じる、感情の豊かな恋愛</text>
  <!-- キャッチフレーズ 2行目 -->
  <text x="60" y="345" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="24" font-weight="400" fill="#3b3d56">家</text>

  <!-- 右側アイコン装飾 -->
  <circle cx="980" cy="300" r="170" fill="#ff7ab3" fill-opacity="0.12"/>
  <circle cx="980" cy="300" r="120" fill="#ff7ab3" fill-opacity="0.10"/>
  <g transform="translate(910, 230) scale(5.833333333333333)">
    <path d="M12 20s-7-4.3-7-10c0-3 2.2-5 4.7-5C11.3 5 12 6.2 12 6.2S12.7 5 14.3 5C16.8 5 19 7 19 10c0 5.7-7 10-7 10z" fill="white"/>
  </g>

  <!-- シェアCTA バッジ -->
  <rect x="60" y="400" width="168" height="40" rx="20" fill="none" stroke="#ff7ab3" stroke-width="1.5"/>
  <text x="144" y="425" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="15" font-weight="600" fill="#ff7ab3" text-anchor="middle">完全無料で診断</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#ff7ab3" fill-opacity="0.12"/>
  <text x="600" y="616" font-family="'Inter', 'Arial', sans-serif" font-size="17" font-weight="600" fill="#ff7ab3" text-anchor="middle">shindan-navi.jp</text>
</svg>