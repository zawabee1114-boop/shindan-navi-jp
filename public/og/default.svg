<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e8ff"/>
      <stop offset="35%" stop-color="#efeaff"/>
      <stop offset="70%" stop-color="#e8f0ff"/>
      <stop offset="100%" stop-color="#f3efff"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#6a47ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#9b85ff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="200" fill="#7c5cff" fill-opacity="0.06"/>
  <circle cx="150" cy="550" r="150" fill="#9b85ff" fill-opacity="0.08"/>
  <circle cx="900" cy="500" r="120" fill="#6a47ff" fill-opacity="0.05"/>

  <!-- Top badge -->
  <rect x="60" y="52" width="160" height="36" rx="18" fill="url(#pill)"/>
  <text x="140" y="75" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">診断ナビ</text>

  <!-- 8 diagnosis icons row -->
  <!-- multi-int -->
  <circle cx="80" cy="190" r="34" fill="#ff9a4d" fill-opacity="0.18"/>
  <text x="80" y="200" font-size="28" text-anchor="middle">🧠</text>
  <!-- mbti -->
  <circle cx="160" cy="190" r="34" fill="#8b5cf6" fill-opacity="0.18"/>
  <text x="160" y="200" font-size="28" text-anchor="middle">🔮</text>
  <!-- blood -->
  <circle cx="240" cy="190" r="34" fill="#ff6f7a" fill-opacity="0.18"/>
  <text x="240" y="200" font-size="28" text-anchor="middle">🩸</text>
  <!-- perfectionism -->
  <circle cx="320" cy="190" r="34" fill="#f0c14e" fill-opacity="0.18"/>
  <text x="320" y="200" font-size="28" text-anchor="middle">⭐</text>
  <!-- disc -->
  <circle cx="400" cy="190" r="34" fill="#34c0a8" fill-opacity="0.18"/>
  <text x="400" y="200" font-size="28" text-anchor="middle">📊</text>
  <!-- love-style -->
  <circle cx="480" cy="190" r="34" fill="#ff7ab3" fill-opacity="0.18"/>
  <text x="480" y="200" font-size="28" text-anchor="middle">💕</text>
  <!-- zodiac -->
  <circle cx="560" cy="190" r="34" fill="#4ea4f0" fill-opacity="0.18"/>
  <text x="560" y="200" font-size="28" text-anchor="middle">⭐</text>
  <!-- money-style -->
  <circle cx="640" cy="190" r="34" fill="#c8a26a" fill-opacity="0.18"/>
  <text x="640" y="200" font-size="28" text-anchor="middle">💰</text>

  <!-- Main headline -->
  <text x="60" y="310" font-family="'Noto Sans JP', sans-serif" font-size="58" font-weight="900" fill="#1f2235" letter-spacing="-1">8診断で、あなたを統合する。</text>

  <!-- Sub text -->
  <text x="60" y="378" font-family="'Noto Sans JP', sans-serif" font-size="28" font-weight="500" fill="#3b3d56">MBTI・多重知能・DiSC・恋愛スタイル・完璧主義</text>
  <text x="60" y="418" font-family="'Noto Sans JP', sans-serif" font-size="28" font-weight="500" fill="#3b3d56">血液型・星座・金銭感覚 を統合プロファイルへ</text>

  <!-- Feature chips -->
  <rect x="60" y="460" width="130" height="38" rx="19" fill="url(#accent)" stroke="#7c5cff" stroke-width="1.5"/>
  <text x="125" y="484" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="600" fill="#7c5cff" text-anchor="middle">完全無料</text>

  <rect x="204" y="460" width="130" height="38" rx="19" fill="url(#accent)" stroke="#7c5cff" stroke-width="1.5"/>
  <text x="269" y="484" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="600" fill="#7c5cff" text-anchor="middle">招待相性</text>

  <rect x="348" y="460" width="160" height="38" rx="19" fill="url(#accent)" stroke="#7c5cff" stroke-width="1.5"/>
  <text x="428" y="484" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="600" fill="#7c5cff" text-anchor="middle">統合プロファイル</text>

  <!-- Right side big illustration -->
  <circle cx="980" cy="315" r="200" fill="#7c5cff" fill-opacity="0.08"/>
  <circle cx="980" cy="315" r="155" fill="#7c5cff" fill-opacity="0.06"/>
  <text x="980" y="270" font-size="80" text-anchor="middle">🌟</text>
  <text x="980" y="360" font-family="'Noto Sans JP', sans-serif" font-size="22" font-weight="700" fill="#6a47ff" text-anchor="middle">統合プロファイル</text>
  <text x="980" y="392" font-family="'Noto Sans JP', sans-serif" font-size="16" font-weight="400" fill="#6e6e89" text-anchor="middle">8診断 × 5シーン</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#7c5cff" fill-opacity="0.08"/>
  <text x="600" y="616" font-family="'Inter', sans-serif" font-size="17" font-weight="600" fill="#7c5cff" text-anchor="middle">shindan-navi.jp</text>
</svg>
