<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e8ff"/>
      <stop offset="35%" stop-color="#efeaff"/>
      <stop offset="70%" stop-color="#e8f0ff"/>
      <stop offset="100%" stop-color="#f3efff"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#6a47ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#9b85ff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="200" fill="#7c5cff" fill-opacity="0.06"/>
  <circle cx="150" cy="550" r="150" fill="#9b85ff" fill-opacity="0.08"/>
  <circle cx="900" cy="500" r="120" fill="#6a47ff" fill-opacity="0.05"/>

  <!-- Top badge -->
  <rect x="60" y="52" width="160" height="36" rx="18" fill="url(#pill)"/>
  <text x="140" y="75" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">診断ナビ</text>

  <!-- 8 diagnosis icons row (SVGパスアイコン - 絵文字なし) -->

  <!-- multi-int: 脳アイコン -->
  <circle cx="80" cy="190" r="34" fill="#ff9a4d" fill-opacity="0.18"/>
  <g transform="translate(57, 167) scale(1.9)">
    <path d="M8.5 3.5c-2 0-3.5 1.4-3.5 3.2 0 .4.1.8.2 1.2C3.8 8.6 3 9.8 3 11.2c0 1.3.7 2.4 1.8 3-.5.6-.8 1.4-.8 2.2 0 1.9 1.5 3.3 3.5 3.3 1.1 0 2.1-.5 2.8-1.2.5.4 1.1.6 1.7.6V5c-.7-.9-1.9-1.5-3.5-1.5z" fill="#ff9a4d"/>
    <path d="M15.5 3.5c2 0 3.5 1.4 3.5 3.2 0 .4-.1.8-.2 1.2 1.4.7 2.2 1.9 2.2 3.3 0 1.3-.7 2.4-1.8 3 .5.6.8 1.4.8 2.2 0 1.9-1.5 3.3-3.5 3.3-1.1 0-2.1-.5-2.8-1.2-.5.4-1.1.6-1.7.6V5c.7-.9 1.9-1.5 3.5-1.5z" fill="#ff9a4d" fill-opacity=".75"/>
  </g>

  <!-- mbti: 4円パターン -->
  <circle cx="160" cy="190" r="34" fill="#8b5cf6" fill-opacity="0.18"/>
  <g transform="translate(137, 167) scale(1.9)">
    <path d="M12 2.5c1.7 0 3 1.3 3 3 0 .8-.3 1.5-.8 2 .5-.5 1.2-.8 2-.8 1.7 0 3 1.3 3 3s-1.3 3-3 3c-.8 0-1.5-.3-2-.8.5.5.8 1.2.8 2 0 1.7-1.3 3-3 3s-3-1.3-3-3c0-.8.3-1.5.8-2-.5.5-1.2.8-2 .8-1.7 0-3-1.3-3-3s1.3-3 3-3c.8 0 1.5.3 2 .8C9.3 7 9 6.3 9 5.5c0-1.7 1.3-3 3-3z" fill="#8b5cf6"/>
    <circle cx="12" cy="11.7" r="2.3" fill="rgba(139,92,246,.4)"/>
  </g>

  <!-- blood-type: しずく -->
  <circle cx="240" cy="190" r="34" fill="#ff6f7a" fill-opacity="0.18"/>
  <g transform="translate(217, 167) scale(1.9)">
    <path d="M12 2.5s-6 7-6 11.4A6 6 0 0 0 12 20a6 6 0 0 0 6-6.1C18 9.5 12 2.5 12 2.5z" fill="#ff6f7a"/>
  </g>

  <!-- perfectionism: シールド+チェック -->
  <circle cx="320" cy="190" r="34" fill="#f0c14e" fill-opacity="0.18"/>
  <g transform="translate(297, 167) scale(1.9)">
    <path d="M12 2.5L4 5.5v6.2c0 4.6 3.2 8.8 8 10 4.8-1.2 8-5.4 8-10V5.5l-8-3z" fill="#f0c14e"/>
    <path d="M8.5 12l2.3 2.3 4.7-4.7" stroke="rgba(0,0,0,.3)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- disc: コンパス -->
  <circle cx="400" cy="190" r="34" fill="#34c0a8" fill-opacity="0.18"/>
  <g transform="translate(377, 167) scale(1.9)">
    <circle cx="12" cy="12" r="9" fill="#34c0a8"/>
    <path d="M12 3v18M3 12h18" stroke="rgba(255,255,255,.6)" stroke-width="1.4"/>
    <circle cx="12" cy="12" r="3" fill="rgba(255,255,255,.9)"/>
  </g>

  <!-- love-style: ハート -->
  <circle cx="480" cy="190" r="34" fill="#ff7ab3" fill-opacity="0.18"/>
  <g transform="translate(457, 167) scale(1.9)">
    <path d="M12 20s-7-4.3-7-10c0-3 2.2-5 4.7-5C11.3 5 12 6.2 12 6.2S12.7 5 14.3 5C16.8 5 19 7 19 10c0 5.7-7 10-7 10z" fill="#ff7ab3"/>
  </g>

  <!-- zodiac: 星 -->
  <circle cx="560" cy="190" r="34" fill="#4ea4f0" fill-opacity="0.18"/>
  <g transform="translate(537, 167) scale(1.9)">
    <path d="M12 4l1.6 4.3L18 9.5l-3.2 2.8.9 4.4L12 14.5 8.3 16.7l.9-4.4L6 9.5l4.4-1.2L12 4z" fill="#4ea4f0"/>
  </g>

  <!-- money-style: コイン -->
  <circle cx="640" cy="190" r="34" fill="#c8a26a" fill-opacity="0.18"/>
  <g transform="translate(617, 167) scale(1.9)">
    <path d="M9 4.5h6l-1.5 3 1.5 1c2.4 1.5 4 4.2 4 6.8 0 3-2.5 5.2-7 5.2s-7-2.2-7-5.2c0-2.6 1.6-5.3 4-6.8L10.5 7.5 9 4.5z" fill="#c8a26a"/>
  </g>

  <!-- Main headline -->
  <text x="60" y="310" font-family="'Noto Sans JP', sans-serif" font-size="58" font-weight="900" fill="#1f2235" letter-spacing="-1">8診断で、あなたを統合する。</text>

  <!-- Sub text -->
  <text x="60" y="378" font-family="'Noto Sans JP', sans-serif" font-size="28" font-weight="500" fill="#3b3d56">MBTI・多重知能・DiSC・恋愛スタイル・完璧主義</text>
  <text x="60" y="418" font-family="'Noto Sans JP', sans-serif" font-size="28" font-weight="500" fill="#3b3d56">血液型・星座・金銭感覚 を統合プロファイルへ</text>

  <!-- Feature chips -->
  <rect x="60" y="460" width="130" height="38" rx="19" fill="url(#accent)" stroke="#7c5cff" stroke-width="1.5"/>
  <text x="125" y="484" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="600" fill="#7c5cff" text-anchor="middle">完全無料</text>

  <rect x="204" y="460" width="130" height="38" rx="19" fill="url(#accent)" stroke="#7c5cff" stroke-width="1.5"/>
  <text x="269" y="484" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="600" fill="#7c5cff" text-anchor="middle">招待相性</text>

  <rect x="348" y="460" width="160" height="38" rx="19" fill="url(#accent)" stroke="#7c5cff" stroke-width="1.5"/>
  <text x="428" y="484" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="600" fill="#7c5cff" text-anchor="middle">統合プロファイル</text>

  <!-- Right side big illustration: 統合を表す3つの重なり合う円 -->
  <circle cx="980" cy="315" r="200" fill="#7c5cff" fill-opacity="0.08"/>
  <circle cx="980" cy="315" r="155" fill="#7c5cff" fill-opacity="0.06"/>

  <!-- 統合シンボル: 3円オーバーラップ -->
  <circle cx="962" cy="300" r="65" fill="#7c5cff" fill-opacity="0.55"/>
  <circle cx="998" cy="300" r="65" fill="#9b85ff" fill-opacity="0.45"/>
  <circle cx="980" cy="330" r="65" fill="#6a47ff" fill-opacity="0.50"/>

  <text x="980" y="368" font-family="'Noto Sans JP', sans-serif" font-size="22" font-weight="700" fill="#6a47ff" text-anchor="middle">統合プロファイル</text>
  <text x="980" y="396" font-family="'Noto Sans JP', sans-serif" font-size="16" font-weight="400" fill="#6e6e89" text-anchor="middle">8診断 x 5シーン</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#7c5cff" fill-opacity="0.08"/>
  <text x="600" y="616" font-family="'Inter', sans-serif" font-size="17" font-weight="600" fill="#7c5cff" text-anchor="middle">shindan-navi.jp</text>
</svg>
